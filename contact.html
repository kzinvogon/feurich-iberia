<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Contact — Feurich Iberia</title>
  <meta name="description" content="Contact Feurich Iberia. Visit our Madrid showroom or arrange a private consultation for the Iberian Peninsula's finest pianos.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Inter:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <script>try{var t=localStorage.getItem('fi_theme');if(t)document.documentElement.dataset.theme=t;}catch(e){}</script>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/themes.css">
</head>
<body>

  <nav id="nav">
    <a href="index.html" class="nav__logo">Feurich<span>Iberia</span></a>
    <button class="nav__toggle" id="nav-toggle" aria-expanded="false" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
    <div class="nav__menu" id="nav-menu">
      <div class="nav__dropdown">
        <a href="index.html#collection" class="nav__link" data-i18n="nav.collection">Collection</a>
        <ul class="nav__dropdown-menu">
          <li><a href="collection/luxury.html" data-i18n="nav.luxury"></a></li>
          <li><a href="collection/self-playing.html" data-i18n="nav.selfPlaying"></a></li>
          <li><a href="collection/grand-uprights.html" data-i18n="nav.grandUprights"></a></li>
          <li><a href="collection/custom-design.html" data-i18n="nav.customDesign"></a></li>
        </ul>
      </div>
      <a href="index.html#services" class="nav__link" data-i18n="nav.services"></a>
      <a href="index.html#journey" class="nav__link" data-i18n="nav.journey"></a>
      <a href="about.html" class="nav__link" data-i18n="nav.about"></a>
      <a href="contact.html" class="nav__link nav__link--active" data-i18n="nav.contact"></a>
      <a href="gallery.html" class="nav__link" data-i18n="nav.gallery"></a>
      <div class="nav__dropdown nav__theme">
        <button class="nav__link nav__theme-trigger" type="button"><span data-i18n="theme.label">Theme</span> ▾</button>
        <ul class="nav__dropdown-menu">
          <li><button type="button" data-theme-btn="noir" data-i18n="theme.noir"></button></li>
          <li><button type="button" data-theme-btn="galeria" data-i18n="theme.galeria"></button></li>
          <li><button type="button" data-theme-btn="hogar" data-i18n="theme.hogar"></button></li>
          <li><button type="button" data-theme-btn="publico" data-i18n="theme.publico"></button></li>
          <li><button type="button" data-theme-btn="familia" data-i18n="theme.familia"></button></li>
          <li><button type="button" data-theme-btn="arte" data-i18n="theme.arte"></button></li>
        </ul>
      </div>
      <div class="nav__lang">
        <button data-lang="en">EN</button>
        <button data-lang="es">ES</button>
        <button data-lang="de">DE</button>
        <button data-lang="fr">FR</button>
        <button data-lang="pt">PT</button>
      </div>
    </div>
  </nav>

  <main class="contact-page section">
    <div class="container">
      <div class="page-header" data-reveal>
        <p class="eyebrow" data-i18n="contact.eyebrow"></p>
        <div class="gold-rule"></div>
        <h1 data-i18n="contact.title"></h1>
        <p class="lead" style="margin-top:.8rem;max-width:560px" data-i18n="contact.subtitle"></p>
      </div>

      <div class="contact-page__grid">
        <!-- Form -->
        <div data-reveal>
          <form class="contact-form" id="contact-form" novalidate>
            <div class="form-row">
              <div class="form-group">
                <label for="name" data-i18n="contact.namePlaceholder"></label>
                <input type="text" id="name" name="name" data-i18n="contact.namePlaceholder" required autocomplete="name">
              </div>
              <div class="form-group">
                <label for="email" data-i18n="contact.emailPlaceholder"></label>
                <input type="email" id="email" name="email" data-i18n="contact.emailPlaceholder" required autocomplete="email">
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label for="phone" data-i18n="contact.phonePlaceholder"></label>
                <input type="tel" id="phone" name="phone" data-i18n="contact.phonePlaceholder" autocomplete="tel">
              </div>
              <div class="form-group">
                <label for="interest" data-i18n="contact.interestLabel"></label>
                <select id="interest" name="interest">
                  <option value="" data-i18n="contact.interestLabel"></option>
                  <option value="luxury" data-i18n="contact.interest1"></option>
                  <option value="self-playing" data-i18n="contact.interest2"></option>
                  <option value="grand" data-i18n="contact.interest3"></option>
                  <option value="upright" data-i18n="contact.interest4"></option>
                  <option value="custom" data-i18n="contact.interest5"></option>
                  <option value="general" data-i18n="contact.interest6"></option>
                </select>
              </div>
            </div>
            <div class="form-group">
              <label for="message" data-i18n="contact.messagePlaceholder"></label>
              <textarea id="message" name="message" data-i18n="contact.messagePlaceholder"></textarea>
            </div>
            <div class="form-submit">
              <button type="submit" class="btn btn--gold" data-i18n="contact.submit"></button>
            </div>
          </form>
        </div>

        <!-- Contact Info -->
        <div class="contact-info" data-reveal data-reveal-delay="1">
          <div class="contact-info__item">
            <p class="contact-info__label" data-i18n="contact.showroomLabel"></p>
            <p class="contact-info__value" data-i18n="contact.address"></p>
          </div>
          <div class="contact-info__item">
            <p class="contact-info__label" data-i18n="contact.phoneLabel"></p>
            <a class="contact-info__value" href="tel:+34911234567" data-i18n="contact.phoneVal"></a>
          </div>
          <div class="contact-info__item">
            <p class="contact-info__label" data-i18n="contact.emailLabel"></p>
            <a class="contact-info__value" href="mailto:info@feurichiberia.com" data-i18n="contact.emailVal"></a>
          </div>
          <div class="contact-info__item">
            <p class="contact-info__label" data-i18n="contact.hoursLabel"></p>
            <p class="contact-info__value" data-i18n="contact.hoursVal"></p>
          </div>
          <!-- Decorative element -->
          <div style="margin-top:2rem;padding-top:2rem;border-top:1px solid var(--border)">
            <p class="footer__tagline" style="font-style:italic" data-i18n="footer.tagline"></p>
          </div>
        </div>
      </div>
    </div>
  </main>

  <footer>
    <div class="container">
      <div class="footer__grid">
        <div class="footer__brand">
          <div class="footer__brand-logo">Feurich</div>
          <div class="footer__brand-sub">Iberia</div>
          <p class="footer__tagline" data-i18n="footer.tagline"></p>
        </div>
        <div>
          <p class="footer__col-title" data-i18n="nav.collection"></p>
          <ul class="footer__links">
            <li><a href="collection/luxury.html" data-i18n="nav.luxury"></a></li>
            <li><a href="collection/self-playing.html" data-i18n="nav.selfPlaying"></a></li>
            <li><a href="collection/grand-uprights.html" data-i18n="nav.grandUprights"></a></li>
            <li><a href="collection/custom-design.html" data-i18n="nav.customDesign"></a></li>
          </ul>
        </div>
        <div>
          <p class="footer__col-title" data-i18n="nav.services"></p>
          <ul class="footer__links">
            <li><a href="services.html" data-i18n="nav.services"></a></li>
            <li><a href="about.html" data-i18n="nav.about"></a></li>
            <li><a href="contact.html" data-i18n="nav.contact"></a></li>
          </ul>
        </div>
        <div>
          <p class="footer__col-title" data-i18n="contact.emailLabel"></p>
          <ul class="footer__links">
            <li><a href="tel:+34911234567" data-i18n="contact.phoneVal"></a></li>
            <li><a href="mailto:info@feurichiberia.com" data-i18n="contact.emailVal"></a></li>
          </ul>
        </div>
      </div>
      <div class="footer__bottom">
        <p class="footer__copyright" data-i18n="footer.copyright"></p>
        <div class="footer__legal">
          <a href="#" data-i18n="footer.privacy"></a>
          <a href="#" data-i18n="footer.terms"></a>
          <a href="https://feurich.com" target="_blank" rel="noopener" data-i18n="footer.feurich"></a>
        </div>
      </div>
    </div>
  </footer>

  <script src="js/i18n.js"></script>
  <script src="js/main.js"></script>
  <script src="js/theme.js"></script>
</body>
</html>
