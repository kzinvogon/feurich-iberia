<!DOCTYPE html>

<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="base-path" content="../">
  <title>Luxury Editions — Feurich Iberia</title>
  <meta name="description" content="Crystal Swarovski inlay, 24k gold leaf and extraordinary bespoke finishes. Feurich luxury piano editions for Spain and Portugal.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Inter:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

  <nav id="nav">
    <a href="../index.html" class="nav__logo">Feurich<span>Iberia</span></a>
    <button class="nav__toggle" id="nav-toggle" aria-expanded="false" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
    <div class="nav__menu" id="nav-menu">
      <div class="nav__dropdown">
        <a href="../index.html#collection" class="nav__link" data-i18n="nav.collection">Collection</a>
        <ul class="nav__dropdown-menu">
          <li><a href="luxury.html" data-i18n="nav.luxury"></a></li>
          <li><a href="self-playing.html" data-i18n="nav.selfPlaying"></a></li>
          <li><a href="grand-uprights.html" data-i18n="nav.grandUprights"></a></li>
          <li><a href="custom-design.html" data-i18n="nav.customDesign"></a></li>
        </ul>
      </div>
      <a href="../index.html#services" class="nav__link" data-i18n="nav.services"></a>
      <a href="../index.html#journey" class="nav__link" data-i18n="nav.journey"></a>
      <a href="../about.html" class="nav__link" data-i18n="nav.about"></a>
      <a href="../contact.html" class="nav__link" data-i18n="nav.contact"></a>
      <a href="../gallery.html" class="nav__link" data-i18n="nav.gallery"></a>
      <div class="nav__lang">
        <button data-lang="en">EN</button>
        <button data-lang="es">ES</button>
        <button data-lang="de">DE</button>
        <button data-lang="fr">FR</button>
        <button data-lang="pt">PT</button>
      </div>
      <a href="../contact.html" class="nav__book" data-i18n="nav.bookConsultation"></a>
    </div>
  </nav>

  <!-- Sub-hero -->
  <header class="sub-hero sub-hero--luxury">
    <div class="sub-hero__bg"></div>
    <div class="container sub-hero__content">
      <p class="eyebrow" data-i18n="luxury.heroEyebrow"></p>
      <div class="gold-rule"></div>
      <h1 data-i18n="luxury.heroTitle"></h1>
      <p class="lead" data-i18n="luxury.heroSubtitle"></p>
    </div>
  </header>

  <!-- Intro -->
  <section class="section">
    <div class="container" style="max-width:780px">
      <p class="lead" data-reveal data-i18n="luxury.intro"></p>
    </div>
  </section>

  <!-- Crystal Inlay -->
  <section class="section section--dark">
    <div class="container">
      <div class="feature-block">
        <div class="feature-block__visual feature-block__visual--crystal" data-reveal="left">
          <img src="../images/crystal-inlay.jpeg" alt="Feurich crystal-acrylic illuminated grand piano">
        </div>
        <div class="feature-block__content" data-reveal="right">
          <p class="eyebrow">Crystal</p>
          <div class="gold-rule"></div>
          <h2 data-i18n="luxury.crystalTitle"></h2>
          <p data-i18n="luxury.crystalText"></p>
          <a href="../contact.html" class="btn btn--outline" style="margin-top:2rem" data-i18n="luxury.inquiryCta"></a>
        </div>
      </div>
    </div>
  </section>

  <!-- Gold Leaf -->
  <section class="section">
    <div class="container">
      <div class="feature-block feature-block--reverse">
        <div class="feature-block__visual feature-block__visual--gold" data-reveal="right">
          <img src="../images/gold-leaf.jpeg" alt="24k gold-leaf piano keys, hand-finished">
        </div>
        <div class="feature-block__content" data-reveal="left">
          <p class="eyebrow">Gold Leaf</p>
          <div class="gold-rule"></div>
          <h2 data-i18n="luxury.goldTitle"></h2>
          <p data-i18n="luxury.goldText"></p>
          <a href="../contact.html" class="btn btn--outline" style="margin-top:2rem" data-i18n="luxury.inquiryCta"></a>
        </div>
      </div>
    </div>
  </section>

  <!-- Bespoke Lacquer -->
  <section class="section section--dark">
    <div class="container">
      <div class="feature-block">
        <div class="feature-block__visual" data-reveal="left">
          <img src="../images/bespoke-lacquer.jpeg" alt="Feurich grand in a bespoke RAL mosaic lacquer finish">
        </div>
        <div class="feature-block__content" data-reveal="right">
          <p class="eyebrow">RAL & Bespoke</p>
          <div class="gold-rule"></div>
          <h2 data-i18n="luxury.lacquerTitle"></h2>
          <p data-i18n="luxury.lacquerText"></p>
          <a href="../contact.html" class="btn btn--gold" style="margin-top:2rem" data-i18n="luxury.inquiryCta"></a>
        </div>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer>
    <div class="container">
      <div class="footer__grid">
        <div class="footer__brand">
          <div class="footer__brand-logo">Feurich</div>
          <div class="footer__brand-sub">Iberia</div>
          <p class="footer__tagline" data-i18n="footer.tagline"></p>
        </div>
        <div>
          <p class="footer__col-title" data-i18n="nav.collection"></p>
          <ul class="footer__links">
            <li><a href="luxury.html" data-i18n="nav.luxury"></a></li>
            <li><a href="self-playing.html" data-i18n="nav.selfPlaying"></a></li>
            <li><a href="grand-uprights.html" data-i18n="nav.grandUprights"></a></li>
            <li><a href="custom-design.html" data-i18n="nav.customDesign"></a></li>
          </ul>
        </div>
        <div>
          <p class="footer__col-title" data-i18n="nav.services"></p>
          <ul class="footer__links">
            <li><a href="../services.html" data-i18n="nav.services"></a></li>
            <li><a href="../about.html" data-i18n="nav.about"></a></li>
            <li><a href="../contact.html" data-i18n="nav.contact"></a></li>
          </ul>
        </div>
        <div>
          <p class="footer__col-title" data-i18n="contact.emailLabel"></p>
          <ul class="footer__links">
            <li><a href="tel:+34911234567" data-i18n="contact.phoneVal"></a></li>
            <li><a href="mailto:info@feurichiberia.com" data-i18n="contact.emailVal"></a></li>
          </ul>
        </div>
      </div>
      <div class="footer__bottom">
        <p class="footer__copyright" data-i18n="footer.copyright"></p>
        <div class="footer__legal">
          <a href="#" data-i18n="footer.privacy"></a>
          <a href="#" data-i18n="footer.terms"></a>
          <a href="https://feurich.com" target="_blank" rel="noopener" data-i18n="footer.feurich"></a>
        </div>
      </div>
    </div>
  </footer>

  <script src="../js/i18n.js"></script>
  <script src="../js/main.js"></script>
