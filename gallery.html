  <style>
    /* ── Gallery grid ── */
    .archive-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.5px;
      background: var(--border);
      margin-top: 2rem;
    }
    .archive-grid figure {
      position: relative;
      overflow: hidden;
      aspect-ratio: 4/3;
      background: var(--surface);
      transition: opacity .35s, transform .35s;
    }
    .archive-grid figure.is-hidden {
      display: none;
    }
    .archive-grid img {
      width: 100%; height: 100%; object-fit: cover; display: block;
      transition: transform .7s var(--ease);
    }
    .archive-grid figure:hover img { transform: scale(1.05); }
    .archive-grid figcaption {
      position: absolute; left: 0; right: 0; bottom: 0;
      padding: 1.3rem 1rem .8rem;
      font-size: .62rem; letter-spacing: .12em; text-transform: uppercase;
      color: #f4efe6;
      background: linear-gradient(to top, rgba(8,8,8,.85) 0%, transparent 100%);
    }

    /* ── Filter bar ── */
    .gf-bar {
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
      padding: 1.5rem 0 0;
    }
    .gf-bar__label {
      font-size: .7rem;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--text-muted);
      white-space: nowrap;
    }
    .gf {
      position: relative;
    }
    .gf__trigger {
      display: flex;
      align-items: center;
      gap: .45rem;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--sans);
      font-size: .78rem;
      letter-spacing: .06em;
      padding: .55rem 1rem;
      cursor: pointer;
      white-space: nowrap;
      transition: border-color .2s, background .2s;
    }
    .gf__trigger:hover { border-color: var(--gold); }
    .gf__trigger.is-active { border-color: var(--gold); background: var(--surface2); }
    .gf__active-val {
      color: var(--gold);
      font-weight: 500;
    }
    .gf__caret { font-size: .6rem; opacity: .6; transition: transform .2s; }
    .gf.is-open .gf__caret { transform: rotate(180deg); }

    .gf__menu {
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      min-width: 190px;
      background: var(--surface);
      border: 1px solid var(--border);
      box-shadow: 0 6px 24px rgba(0,0,0,.14);
      list-style: none;
      padding: .5rem 0;
      opacity: 0;
      pointer-events: none;
      transform: translateY(-6px);
      transition: opacity .2s, transform .2s;
      z-index: 50;
    }
    .gf.is-open .gf__menu {
      opacity: 1;
      pointer-events: all;
      transform: translateY(0);
    }
    .gf__menu button {
      display: block;
      width: 100%;
      text-align: left;
      background: none;
      border: none;
      padding: .55rem 1.1rem;
      font-family: var(--sans);
      font-size: .78rem;
      color: var(--text);
      cursor: pointer;
      transition: background .15s, color .15s;
    }
    .gf__menu button:hover { background: var(--surface2); }
    .gf__menu button.is-selected { color: var(--gold); }

    .gf__clear {
      background: none;
      border: none;
      font-family: var(--sans);
      font-size: .72rem;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--text-muted);
      cursor: pointer;
      padding: .5rem .2rem;
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s, color .2s;
    }
    .gf__clear.is-visible { opacity: 1; pointer-events: all; }
    .gf__clear:hover { color: var(--gold); }

    .gf__count {
      margin-left: auto;
      font-size: .72rem;
      letter-spacing: .1em;
      color: var(--text-muted);
      white-space: nowrap;
    }

    .gf-empty {
      display: none;
      grid-column: 1 / -1;
      text-align: center;
      padding: 4rem 1rem;
      color: var(--text-muted);
      font-size: .9rem;
      background: none;
    }
    .gf-empty.is-visible { display: block; }

    @media (max-width: 600px) {
      .gf-bar { gap: .6rem; }
      .gf__count { width: 100%; margin-left: 0; }
    }
  </style>

  <script>
  (function () {
    var activeFilters = { type: '', finish: '', setting: '' };
    var total = document.querySelectorAll('#archive-grid figure').length;

    function applyFilters() {
      var figures = document.querySelectorAll('#archive-grid figure');
      var visible = 0;
      figures.forEach(function (fig) {
        var show = Object.keys(activeFilters).every(function (dim) {
          var val = activeFilters[dim];
          if (!val) return true;
          var figVal = (fig.dataset[dim] || '').split(' ');
          return figVal.indexOf(val) !== -1;
        });
        fig.classList.toggle('is-hidden', !show);
        if (show) visible++;
      });

      var count = document.getElementById('gf-count');
      count.textContent = visible === total
        ? total + ' images'
        : visible + ' of ' + total + ' images';

      var empty = document.getElementById('gf-empty');
      empty.classList.toggle('is-visible', visible === 0);

      var clearBtn = document.getElementById('gf-clear');
      var anyActive = Object.values(activeFilters).some(Boolean);
      clearBtn.classList.toggle('is-visible', anyActive);
    }

    // Dropdown toggle
    document.getElementById('gf-bar').addEventListener('click', function (e) {
      var trigger = e.target.closest('.gf__trigger');
      var optionBtn = e.target.closest('.gf__menu button');

      if (trigger) {
        var gf = trigger.closest('.gf');
        var wasOpen = gf.classList.contains('is-open');
        // Close all
        document.querySelectorAll('.gf').forEach(function (g) {
          g.classList.remove('is-open');
          g.querySelector('.gf__trigger').setAttribute('aria-expanded', 'false');
        });
        if (!wasOpen) {
          gf.classList.add('is-open');
          trigger.setAttribute('aria-expanded', 'true');
        }
        return;
      }

      if (optionBtn) {
        var gf = optionBtn.closest('.gf');
        var dim = gf.dataset.gf;
        var val = optionBtn.dataset.val;

        // Update selection
        gf.querySelectorAll('.gf__menu button').forEach(function (b) {
          b.classList.remove('is-selected');
        });
        optionBtn.classList.add('is-selected');

        // Update trigger label
        var activeSpan = gf.querySelector('.gf__active-val');
        activeSpan.textContent = val ? ' · ' + optionBtn.textContent : '';
        gf.querySelector('.gf__trigger').classList.toggle('is-active', !!val);

        activeFilters[dim] = val;
        applyFilters();

        // Close dropdown
        gf.classList.remove('is-open');
        gf.querySelector('.gf__trigger').setAttribute('aria-expanded', 'false');
      }
    });

    // Clear all
    document.getElementById('gf-clear').addEventListener('click', function () {
      Object.keys(activeFilters).forEach(function (k) { activeFilters[k] = ''; });
      document.querySelectorAll('.gf').forEach(function (gf) {
        gf.querySelectorAll('.gf__menu button').forEach(function (b) {
          b.classList.remove('is-selected');
        });
        gf.querySelector('.gf__menu button[data-val=""]').classList.add('is-selected');
        gf.querySelector('.gf__active-val').textContent = '';
        gf.querySelector('.gf__trigger').classList.remove('is-active');
      });
      applyFilters();
    });

    // Close on outside click
    document.addEventListener('click', function (e) {
      if (!e.target.closest('.gf')) {
        document.querySelectorAll('.gf').forEach(function (g) {
          g.classList.remove('is-open');
          g.querySelector('.gf__trigger').setAttribute('aria-expanded', 'false');
        });
      }
    });

    // Init count
    applyFilters();
  })();
  </script>
