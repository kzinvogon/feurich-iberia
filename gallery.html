    .archive-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.5px; background: var(--border); margin-top: 3rem; }

    .archive-grid img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform .7s var(--ease); }
    .archive-grid figure:hover img { transform: scale(1.05); }
    .archive-grid figcaption { position: absolute; left: 0; right: 0; bottom: 0; padding: 1.3rem 1rem .8rem; font-size: .62rem; letter-spacing: .12em; text-transform: uppercase; color: var(--text); background: linear-gradient(to top, rgba(8,8,8,.9) 0%, transparent 100%); }
